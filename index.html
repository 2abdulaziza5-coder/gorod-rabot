<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    function sendToBot() {
        let t = document.getElementById('title').value;
        let p = document.getElementById('price').value;
        let d = document.getElementById('desc').value;

        if(!t || !p) {
            alert("Пожалуйста, заполни название и цену!");
            return;
        }

        // Эта строка отправляет данные в твой бот
        tg.sendData(JSON.stringify({title: t, price: p, desc: d}));
        tg.close();
    }
</script>
